Knowledge:Autonomous Flight & Obstacle Avoidance
整体流程：传感器感知 -> 环境建模与障碍物检测 -> 轨迹规划与局部避障 -> 飞行控制与执行 -> 状态估计与闭环优化。

感知层：
    视觉：单目/双目/深度相机，完成障碍物、地面、目标点检测。
    非视觉：激光雷达、超声波、毫米波雷达，提供距离与速度信息。
    传感器融合：IMU + GPS + 视觉/雷达，提升鲁棒性与精度。

环境建模与障碍物检测层：
    深度估计或距离测量：构建局部深度图/距离场。
    占据栅格/代价地图：把空间划分为栅格，标记“可行/不可行”与代价。
    障碍物提取：聚类点云/深度图中的高代价区域，得到障碍物轮廓与位置。

轨迹规划与局部避障层：
    全局规划：基于简化地图的 A*/Dijkstra/搜索树 (RRT/RRT*)，给出全局路线。
    局部避障：在当前速度与约束下实时调整轨迹，如 DWA/人工势场/VO 等。
    约束条件：速度/加速度限制、转弯半径、禁飞区等。

飞行控制与执行层：
    控制结构：位置环 -> 速度环 -> 姿态环，级联 PID 或 MPC。
    指令转换：将规划出的期望轨迹（位置/速度）转换为姿态或推力指令。
    安全机制：紧急停车/高度保持/返航逻辑。

状态估计与闭环优化层：
    状态量：位置、速度、姿态、角速度等。
    滤波算法：扩展卡尔曼滤波 (EKF)、无迹卡尔曼滤波 (UKF) 等。
    闭环：利用状态估计反馈优化规划与控制，实现稳定避障与飞行。

