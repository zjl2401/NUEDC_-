Knowledge:Precision Measurement & Mapping
整体流程：相机/传感器标定 -> 图像预处理 -> 特征提取与匹配 -> 几何测量/深度估计 -> 点云/地图构建 -> 精度评估与误差分析。

标定与预处理层：
    相机内参标定：焦距、主点、畸变系数 (k1, k2, p1, p2...)。
    外参标定：相机与世界坐标系/机器人坐标系之间的旋转和平移。
    畸变校正与去噪：利用标定结果矫正鱼眼/桶形畸变，滤除图像噪声。

特征提取与匹配层：
    特征点检测：角点 (Harris, Shi-Tomasi)、SIFT/ORB 等局部特征。
    特征描述与匹配：通过描述子距离（L2/Hamming）做特征匹配。
    RANSAC 估计：利用 RANSAC 估计单应矩阵/基础矩阵，剔除误匹配。

深度估计与几何测量层：
    双目测距：根据视差 (disparity) 和基线长度，三角测量得到深度。
    结构光/ToF：通过已知编码光模式或时间飞行测量距离。
    PnP 解算：利用已知 3D-2D 对求解相机位姿。

点云与建图层：
    点云生成：把像素 + 深度转换为 3D 点 (x, y, z)。
    点云滤波：体素栅格降采样、统计滤波去除离群点。
    配准与融合：使用 ICP/NDT 等算法对多帧点云做配准，构建全局地图。

精度评估与误差分析层：
    误差来源：标定误差、像素量化误差、匹配误差、传感器噪声。
    评估指标：RMSE、重投影误差、地图重合度、绝对/相对位姿误差。
    误差传播分析：研究测量链路中每一步对最终精度的贡献。

