Knowledge:Object Recognition & Classification
感知层：图像采集 -> 预处理 -> 特征提取。
    采集：USB 摄像头 / 工业相机 / 录像流。
    预处理：分辨率缩放、去噪、直方图均衡、颜色空间转换 (BGR->HSV/Lab/Gray)。
    目标增强：阈值分割（颜色/灰度）、形态学运算、ROI 裁剪，得到更“干净”的前景区域。

候选生成层：产生若干候选目标区域（候选框/候选掩膜）。
    经典方法：连通域提取、Blob 检测、边缘/轮廓检测。
    深度学习：目标检测器 (Faster R-CNN / YOLO / SSD) 直接输出候选框。

特征表示层：把每个候选区域编码成“可区分”的特征向量。
    传统特征：颜色直方图、HOG、LBP、SIFT/ORB 关键点。
    深度特征：卷积神经网络 (CNN) 的中间层特征 (Backbone: ResNet/MobileNet 等)。

分类与决策层：根据特征进行“是什么”的判断。
    经典分类器：SVM / kNN / 决策树 / 随机森林 / Softmax 线性分类器。
    深度分类：端到端 CNN / Transformer 分类头。
    多类别/多标签：交叉熵损失 / Focal Loss，支持不均衡数据集。

后处理与多帧融合层：
    置信度阈值：过滤低置信度检测结果。
    NMS：非极大值抑制，合并重叠候选框。
    多帧稳定：时间滤波（滑动平均）、简单轨迹跟踪（ID 保持）、卡尔曼滤波平滑类别和位置。

输出层：
    输出格式：类别 ID / 类别名称 + 置信度 + 2D/3D 位置（可选）。
    下游接口：控制决策模块（如机器人动作选择）、人机界面显示、日志记录与回放。

训练与评估闭环：
    数据准备：采集多场景图片 -> 标注 -> 划分训练/验证/测试集。
    训练：数据增强（旋转、缩放、光照变化）、迁移学习、超参数搜索。
    评估：Accuracy / Precision-Recall / mAP、混淆矩阵；误识别案例回溯到“感知/特征/分类”哪一层。

