HSV
特性        单段 (Single-range)         双段 (Dual-range)
典型代表    绿色、蓝色、黄色             红色
区间形态    一个连续的区间               两个不连续的区间
数学逻辑    mask = range(A, B)          mask = range(A, B) OR range(C, D)
复杂度      低，直接过滤                 中，需要做位运算（OR）合并
原因        颜色在 H 轴中间              颜色在 H 轴两端（环形截断）

1. 理解数值的含义 (为什么是这些数字？)
    以 [0, 100, 100] 到 [10, 255, 255] 为例：
        H (Hue) 色调：0 到 10这是红色的核心区间。在 OpenCV 的 180 度色域中，$0$ 附近是正红色。
        S (Saturation) 饱和度：100 到 255
            100 是下限，意味着颜色要“足够鲜艳”。过滤掉那些发白、发灰的杂色（比如白墙）。
        V (Value) 亮度：100 到 255
            100 是下限，意味着颜色要“足够亮”。过滤掉阴影或深色的背景噪声。
2. 常用颜色的“经验值”表
如果你不知道从哪里开始，可以先套用这些经过社区验证的常用范围：
颜色        H 范围 (Low - High)     建议 S/V 下限
红色 (段1)  0 - 10                  100, 100
红色 (段2)  160 - 180               100, 100
绿色        35 - 85                 100, 100
蓝色        100 - 124               100, 100
黄色        26 - 34                 100, 100

输入：
    frame：摄像头捕捉到的原始 BGR 彩色图像。
    lower & upper：预设的颜色阈值（如红色的 HSV 范围）。
进行了什么操作：
    空间转换：将图像从 BGR 转换为 HSV 空间，实现亮度与色调分离。
    阈值过滤：调用 cv2.inRange()。遍历图中每个像素，如果该像素的 $H, S, V$ 都在设定范围内，则标记为 255（白色），否则标记为 0（黑色）。
    位运算（如果是红色）：将跨越 $0^\circ$ 的两段红色区域进行 OR 合并。
输出：
    mask：一张二值图（黑白图）。白色区域是你想要的颜色，黑色是背景。