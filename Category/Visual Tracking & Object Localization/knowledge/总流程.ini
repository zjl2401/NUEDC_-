Knowledge:Visual Tracking & Object Localization
感知层：图像预处理 -> 形态学分析 -> 轮廓提取。
    CLAHE 光照归一化（光照是否不均，是则需要，否则不需要-》定时采样检测：如果图像的平均灰度值或对比度在短时间内发生剧烈变化（比如从小车进阴影），再开启 CLAHE。）

    A.HSV 颜色分割 /B.灰度阈值分割(目标是否为黑白，是则B，否则A-》如果目标颜色非常单一，Lab 空间 有时比 HSV 在抗光照变化上更稳。)

    形态学运算（画面是否有碎屑/反光，需要补全连通域，是则需要，否则不需要）

    A.连通域 / B.Blob 提取 （是否需要找到有可能的“嫌疑区域”，是则需要A，否则不需要A/是否需要从“嫌疑区域”中确认哪些是任务目标，是则需要B，否则不需要B）

筛选层（多目标选择）：通过长宽比、面积占比、数字识别，从堆轮廓中选出 $N$ 个候选项。
    多目标选择（是否是单一追踪或是有强约束环境，是则不需要，否则需要-》候选队列（Candidate List）：1.给每个轮廓打分（Score = 形状得分 + 颜色得分 + 面积得分）2.ROI 裁剪（重点修改）：一旦筛选层锁定了目标，下一帧的感知层应直接进入 ROI（感兴趣区域） 模式。这能节省 RK3588 约 70% 的计算量。）
    
    形状分析（效率优先（初级过滤）：长宽比/鲁棒性优先（球体锁定）：圆度分析/准确性优先（标志识别）：多边形逼近/精度优先（姿态解算）：minAreaRect-》minAreaRect 不仅仅是精度优先，它输出的**角度（Angle）**是 PnP 初始化和解决“翻转歧义”的重要参考。）

    多帧置信度累加（防止目标闪烁）。

定位层：对这 $N$ 个目标进行 PnP 解算，得到当前的 $x, y, z$（观测值）。
    目标选择和定位（黑框四边形检测/圆心检测/特征点匹配/Aruco/AprilTag+A.pnp测算/B.透视变换，是否要做前馈控制（Lead Compensation），是需要A，否则只要保证对象在画面中心即可（如激光追踪），需要B）

    坐标系转换：“坐标系映射”。PnP 得到的是“相机坐标系”，需要根据相机安装位置（Offset）转换成“机器人底盘/无人机坐标系”。

    相机外参偏置补偿（相机不在中心点）

状态估计层：
    输入：当前帧的观测值 + 历史帧的运动状态。   
    计算：进行位置预测、速度更新、数据平滑。
    状态估计（预测逻辑）（是否需要应对短暂遮挡/应对短暂遮挡/平滑噪声抖动，是则需要，否则不需要）
        ID 分配与丢失处理：
            生命周期 (Life Cycle)：给每个预测目标设置一个“寿命值”。比如连续 5 帧没检测到，判定为“丢失”；连续检测到 3 帧，判定为“稳定目标”。
        异常值剔除 (Outlier Rejection)：
            在计算预测之前，检查当前 PnP 结果是否符合物理逻辑。如果一帧之内位移了 10 米，这显然是误识别，状态估计应忽略此帧观测值，强制进入预测模式。
        
        卡尔曼滤波 (KF) 代替简单 $P+V$，处理非匀速运动。（平滑）

输出层：将估计出的稳定位置发给执行机构（无人机舵机或电机）。
    前馈补偿，解决串口传输导致的控制滞后。（解决“跟不上”）

通信层 (Communication Layer)
    协议封装：将 $x, y, z, r, p, y$ 封装成特定的帧格式（如 Header + Data + Checksum）。
    频率对齐：RK3588 的处理频率（可能 60fps）与单片机/飞控的控制频率（可能 200Hz）不对齐，需要考虑发送间隔控制，避免串口堵塞。

----

线程 1：负责感知与筛选（耗时最长）。

线程 2：负责定位与状态估计（计算量小，实时性要求高）。

线程 3：负责串口发送。

----------------------------------------------------------------------

场景案例 A：工业自动化流水线（筛7选蓝色长方形零件）
    在该场景中，机器人需要从杂乱的背景中精准抓取蓝色、长方形的金属片，并排除圆形的螺母干扰。
        1. 视觉检测实现流程
        算法/功能           具体操作说明
        CLAHE 光照归一化     传送带上方光照不均，通过 createCLAHE 增强蓝色金属片的边缘对比度，防止暗部细节丢失。
        HSV 颜色分割         设定蓝色区间 H:[100, 124]。通过 inRange 生成二值图，过滤掉黄色传送带和反光杂质。
        形态学运算           调用 cv2.morphologyEx。使用开运算消除皮带上的细小碎屑，使用闭运算填补零件表面反光造成的空洞。
        连通域 / Blob 提取   使用 findContours 提取轮廓。设定面积过滤（如 > 500 像素），排除掉由于颜色误差产生的小色块。
        形状简单分类         关键点： 计算长宽比（Aspect Ratio）。长方形零件的长宽比通常 $> 2.0$，而圆形螺母接近 $1.0$。
        多目标选择           逻辑选择：select_target_by_color_name("blue") 配合形状过滤，锁定最靠近机械臂的零件。

场景案例 B：智能小车路标识别（红灯与红色三角提醒）
    在该场景中，小车需要区分圆形的红灯（停止信号）和三角形的红色路标（转向提醒）。
        1. 视觉检测实现流程
        算法/功能位置       具体操作说明
        CLAHE 光照归一化    户外环境光线剧烈变化。先均衡化 V 通道，确保即使在逆光下红色区域也能被准确提取。
        HSV 颜色分割        双段处理： 合并 $H \in [0, 10]$ 和 $H \in [170, 180]$，完整覆盖交通红色的波段。
        连通域 / Blob 提取  提取所有红色色块的矩心 $(M_{10}/M_{00}, M_{01}/M_{00})$。通过中心点确定路标在视野中的方位。
        形状分类（进阶）     使用 approxPolyDP (多边形逼近)。拟合后顶点数为 3 则判定为三角路标；圆度 $> 0.85$ 则判定为红灯。
        多目标选择          逻辑选择：根据任务指令选择。如果当前是行驶状态，优先跟踪 shape == "triangle" 的路标。

场景案例 C：AGV 小车“二维码/地标”定位（室内导航）
    在自动化仓库中，AGV 小车需要通过地面贴着的**黑色方块（地标）**来纠正自己的航向。这要求极高的定位精度和实时位姿计算。
        1. 视觉检测实现流程
        算法/功能位置           具体操作说明
        CLAHE 光照归一化        仓库地面反光严重，通过 CLAHE 抑制高光溢出，确保黑色地标边缘与明亮地面的界限清晰。
        灰度阈值分割 (替代HSV)   针对黑白目标，通常直接对灰度图做 threshold。黑色地标对应低亮度区间。
        形态学运算              使用闭运算消除地标表面由于磨损产生的细小划痕，保证连通域的完整性。
        连通域 / 矩心计算        提取地标矩心。通过矩心 $(cx, cy)$ 与图像中心线的偏移量计算偏航角 (Yaw)。
        形状特征判别            关键点： 使用 minAreaRect 获取最小外接矩形。计算其旋转角度，用于调整小车的行进角度。
        目标选择与定位          select_target_by_id。当视野中出现多个地标时，根据上一帧位置锁定距离最近的目标，实现平滑跟踪。

场景案例 D：无人机视觉追踪“黄色运动球体”
    在体育赛事转播或自动化防卫中，无人机需要锁定并跟拍一个高速移动的黄色网球。这要求算法能处理运动模糊并进行位置预测。
        1. 视觉检测实现流程
        算法/功能位置       具体操作说明
        HSV 颜色分割        设置黄色区间 H:[26, 34]。针对高速运动导致的色彩稀释，适当调低 $S$（饱和度）的阈值下限。
        连通域提取          findContours。在高速运动场景下，过滤掉由于摄像头抖动产生的所有长条形伪影。
        圆度分析            关键点： 计算圆度 $4\pi A/P^2$。网球在飞行中始终保持圆形，即使发生运动模糊，其包络线仍趋向圆形。
        状态估计（预测逻辑） 位置预测： 利用当前帧和前一帧的位移，计算速度矢量。如果当前帧目标丢失，则根据 $P_{next} = P_{curr} + V$ 预测位置。
        多目标选择          select_target_by_gesture。此处转化为“选择最符合运动轨迹的目标”，排除背景中静态黄色物体的干扰。

形状分析
1. 核心异同对比表
特征维度        长宽比 (Aspect Ratio)       圆度分析 (Circularity)      多边形逼近 (approxPolyDP)       最小外接矩形 (minAreaRect)
数学依据        矩形边界的 $W/H$ 比值        面积与周长平方的比值         曲线段的直线化简化               最小面积旋转矩阵
解决的问题      快速区分“长条”与“方块”       区分“圆”与“非圆”             确定“几个角” (三角/矩形)         获取“旋转姿态” (Angle)
优点            计算最简单，速度最快         对旋转不敏感，适合球体        逻辑最准确，能分清几何形状       精度最高，能指导物理动作
缺点            物体倾斜时误差极大           边缘毛刺对周长影响大          对 $\epsilon$ 参数调节较敏感    计算量相对较大

解决的是“选哪一个”的问题
两者是线性先后关系：先对视野内所有疑似物体进行定位，再通过选择策略确定最终的操作目标。
1. 核心异同对比表
特征维度        目标定位 (Localization)         多目标选择 (Selection)
关注点	        几何属性（坐标、大小、角度）      逻辑属性（优先级、连续性、特征匹配）
处理对象	    单个候选轮廓 (Contour)	         候选目标列表 (Candidates List)
核心算法	    矩心计算、外接矩形、PnP 测距      欧氏距离判定、面积排序、状态机
输入	        二值化 Mask / 连通域	        多个定位后的目标数据
输出            像素坐标 $(x, y)$ 或物理坐标     唯一选定的目标 ID 或其属性数据
解决的问题	    确定目标在空间中的确切位置	      解决“跟错人”、“目标抖动”或“干扰项”问题

方式	        提取的点            适用场景
四边形检测	     四个角点	        电赛、二维码、矩形地标、装甲板。
圆心检测	     多个圆的圆心	    已知固定间距的圆形排布目标。
特征点匹配	     SIFT/ORB 关键点	识别复杂的真实物体（如水杯、零件），通过模板对比找点。
Aruco/AprilTag	码的四个内角点	    最推荐方案。自带 ID，自带精准角点提取，抗干扰极强